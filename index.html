<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡鲸密码箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 800px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .title {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #64c8ff, #b482ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 50px;
        }
        
        .mode-cards {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .mode-card {
            width: 320px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }
        
        .mode-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(100, 200, 255, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .mode-card.selected {
            border-color: #64c8ff;
            background: rgba(100, 200, 255, 0.1);
        }
        
        .mode-icon {
            font-size: 32px;
            margin-bottom: 16px;
        }
        
        .mode-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
        }
        
        .mode-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .mode-features {
            list-style: none;
            padding: 0;
        }
        
        .mode-features li {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .mode-features li::before {
            content: '•';
            color: #64c8ff;
        }
        
        .remember-option {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        
        .remember-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .confirm-btn {
            margin-top: 30px;
            padding: 16px 60px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.5;
            pointer-events: none;
        }
        
        .confirm-btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .confirm-btn.active:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(67, 97, 238, 0.4);
        }
        
        .switch-mode {
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .switch-mode a {
            color: #64c8ff;
            text-decoration: none;
        }
        
        .switch-mode a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐋</div>
        <h1 class="title">泡泡鲸密码箱</h1>
        <p class="subtitle">请选择您的使用方式，我们将为您定制体验</p>
        
        <div class="mode-cards">
            <div class="mode-card" data-mode="study" onclick="selectMode('study')">
                <div class="mode-icon">📚</div>
                <div class="mode-title">我是学习者</div>
                <div class="mode-desc">我希望系统学习密码学知识，进行深入研究</div>
                <ul class="mode-features">
                    <li>专业工具与推导画布</li>
                    <li>LaTeX公式渲染</li>
                    <li>历史记录与快照</li>
                    <li>简洁专业的界面</li>
                </ul>
            </div>
            
            <div class="mode-card" data-mode="browse" onclick="selectMode('browse')">
                <div class="mode-icon">✨</div>
                <div class="mode-title">我是爱好者</div>
                <div class="mode-desc">我想体验密码学的魅力，感受科技之美</div>
                <ul class="mode-features">
                    <li>炫酷的视觉效果</li>
                    <li>语音助手交互</li>
                    <li>手势隔空控制</li>
                    <li>趣味动画演示</li>
                </ul>
            </div>
        </div>
        
        <div class="remember-option">
            <input type="checkbox" id="remember-choice">
            <label for="remember-choice">记住我的选择，下次不再询问</label>
        </div>
        
        <button class="confirm-btn" id="confirm-btn" onclick="confirmChoice()">进入泡泡鲸密码箱</button>
        
        <div class="switch-mode" id="switch-hint" style="display: none;">
            已选择模式，您可以在设置中随时切换
        </div>
    </div>
    
    <script>
        let selectedMode = null;
        
        function selectMode(mode) {
            selectedMode = mode;
            
            document.querySelectorAll('.mode-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            document.querySelector(`[data-mode="${mode}"]`).classList.add('selected');
            
            const btn = document.getElementById('confirm-btn');
            btn.classList.add('active');
        }
        
        function confirmChoice() {
            if (!selectedMode) return;
            
            const remember = document.getElementById('remember-choice').checked;
            
            if (remember) {
                localStorage.setItem('appMode', selectedMode);
                localStorage.setItem('appModeRemembered', 'true');
            } else {
                sessionStorage.setItem('appMode', selectedMode);
            }
            
            if (selectedMode === 'study') {
                window.location.href = './study/index.html';
            } else {
                window.location.href = './browse/index.html';
            }
        }
        
        // 检查是否已有保存的模式
        window.onload = function() {
            const savedMode = localStorage.getItem('appMode');
            const remembered = localStorage.getItem('appModeRemembered');
            
            if (savedMode && remembered === 'true') {
                if (savedMode === 'study') {
                    window.location.href = './study/index.html';
                } else {
                    window.location.href = './browse/index.html';
                }
            }
        };
    </script>
</body>
</html>
