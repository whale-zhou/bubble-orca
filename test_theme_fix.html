<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主题切换测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 主题样式 */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --card-bg: #ffffff;
        }
        
        [data-theme="dark"] {
            --bg-color: #0a0e27;
            --text-color: #ffffff;
            --card-bg: #1a1f3a;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        
        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container mx-auto p-4">
        <div class="card mb-4">
            <h1 class="text-2xl font-bold mb-4">主题切换测试</h1>
            <p class="mb-4">当前主题: <span id="current-theme">light</span></p>
            <button id="theme-toggle" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
                切换主题
            </button>
        </div>
        
        <div class="card">
            <h2 class="text-xl font-semibold mb-2">测试内容</h2>
            <p>这是一段测试文本，用于验证主题切换效果。</p>
            <p class="mt-2">背景色和文字颜色应该随着主题切换而变化。</p>
        </div>
    </div>

    <script>
        // 全局变量
        let currentTheme = localStorage.getItem('theme') || 'light';
        
        // 初始化主题
        function initTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeDisplay();
        }
        
        // 更新主题显示
        function updateThemeDisplay() {
            document.getElementById('current-theme').textContent = currentTheme;
        }
        
        // 切换主题
        document.getElementById('theme-toggle').addEventListener('click', function() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeDisplay();
            console.log('主题切换为:', currentTheme);
        });
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            console.log('初始主题:', currentTheme);
        });
    </script>
</body>
</html>
