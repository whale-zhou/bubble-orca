<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修复测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        /* 简单的主题样式 */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --card-bg: #ffffff;
        }
        
        [data-theme="dark"] {
            --bg-color: #0a0e27;
            --text-color: #ffffff;
            --card-bg: #1a1f3a;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .card {
            background-color: var(--card-bg);
        }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="container mx-auto max-w-4xl">
        <h1 class="text-3xl font-bold mb-8 text-center">修复测试页面</h1>
        
        <!-- 主题切换测试 -->
        <div class="card rounded-xl shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4">主题切换测试</h2>
            <p class="mb-4">点击下方按钮测试主题切换功能，应该只需点击一次即可切换主题。</p>
            <button id="theme-toggle" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-primary/90 transition-colors">
                <i class="fa fa-moon-o"></i> 切换主题
            </button>
        </div>
        
        <!-- SHA-256测试 -->
        <div class="card rounded-xl shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4">SHA-256测试</h2>
            <div class="mb-4">
                <label for="sha256-test" class="block mb-2 font-medium">输入测试文本：</label>
                <input type="text" id="sha256-test" class="w-full px-4 py-2 border border-gray-300 rounded-lg" value="1">
            </div>
            <button id="sha256-test-btn" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-primary/90 transition-colors mb-4">
                测试SHA-256
            </button>
            <div id="sha256-test-result" class="mt-4 p-4 bg-gray-100 dark:bg-gray-800 rounded-lg"></div>
        </div>
        
        <!-- 位运算按钮测试 -->
        <div class="card rounded-xl shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4">位运算按钮测试</h2>
            <div class="grid grid-cols-2 gap-4">
                <button class="bit-operator-btn bg-primary text-white py-3 px-5 rounded-xl" data-operator="&" data-translate-key="bit_operation_type_and">按位与 (&)</button>
                <button class="bit-operator-btn bg-primary text-white py-3 px-5 rounded-xl" data-operator="|" data-translate-key="bit_operation_type_or">按位或 (|)</button>
                <button class="bit-operator-btn bg-primary text-white py-3 px-5 rounded-xl" data-operator="^" data-translate-key="bit_operation_type_xor">按位异或 (^)</button>
                <button class="bit-operator-btn bg-primary text-white py-3 px-5 rounded-xl" data-operator="~" data-translate-key="bit_operation_type_not">按位非 (~)</button>
                <button class="bit-operator-btn bg-primary text-white py-3 px-5 rounded-xl" data-operator="&lt;&lt;" data-translate-key="bit_operation_type_left_shift">逻辑左移 (&lt;&lt;)</button>
                <button class="bit-operator-btn bg-primary text-white py-3 px-5 rounded-xl" data-operator="&gt;&gt;" data-translate-key="bit_operation_type_right_shift">逻辑右移 (&gt;&gt;)</button>
                <button class="bit-operator-btn bg-primary text-white py-3 px-5 rounded-xl" data-operator="circular_left" data-translate-key="bit_operation_type_circular_left">循环左移</button>
                <button class="bit-operator-btn bg-primary text-white py-3 px-5 rounded-xl" data-operator="circular_right" data-translate-key="bit_operation_type_circular_right">循环右移</button>
            </div>
            <div class="mt-4">
                <button id="translate-test-btn" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-primary/90 transition-colors">
                    测试翻译
                </button>
            </div>
        </div>
        
        <!-- 测试结果 -->
        <div class="card rounded-xl shadow-lg p-6">
            <h2 class="text-2xl font-bold mb-4">测试结果</h2>
            <div id="test-results" class="space-y-2"></div>
        </div>
    </div>
    
    <!-- SHA-256实现 -->
    <script>
        // 从index.html复制的SHA-256实现
        function sha256(message) {
            const K = [
                0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
            ];

            function rotateRight(n, x) {
                return (x >>> n) | (x << (32 - n));
            }

            function sigma0(x) {
                return rotateRight(7, x) ^ rotateRight(18, x) ^ (x >>> 3);
            }

            function sigma1(x) {
                return rotateRight(17, x) ^ rotateRight(19, x) ^ (x >>> 10);
            }

            function capSigma0(x) {
                return rotateRight(2, x) ^ rotateRight(13, x) ^ rotateRight(22, x);
            }

            function capSigma1(x) {
                return rotateRight(6, x) ^ rotateRight(11, x) ^ rotateRight(25, x);
            }

            function ch(x, y, z) {
                return (x & y) ^ (~x & z);
            }

            function maj(x, y, z) {
                return (x & y) ^ (x & z) ^ (y & z);
            }

            // 消息填充
            const bytes = [];
            for (let i = 0; i < message.length; i++) {
                bytes.push(message.charCodeAt(i) & 0xff);
            }

            const originalLength = bytes.length * 8;
            bytes.push(0x80);

            while ((bytes.length * 8) % 512 !== 448) {
                bytes.push(0x00);
            }

            for (let i = 0; i < 8; i++) {
                bytes.push((originalLength >>> ((7 - i) * 8)) & 0xff);
            }

            // 初始化哈希值
            let h0 = 0x6a09e667;
            let h1 = 0xbb67ae85;
            let h2 = 0x3c6ef372;
            let h3 = 0xa54ff53a;
            let h4 = 0x510e527f;
            let h5 = 0x9b05688c;
            let h6 = 0x1f83d9ab;
            let h7 = 0x5be0cd19;

            // 处理每个512位块
            for (let i = 0; i < bytes.length; i += 64) {
                const w = new Array(64);

                // 消息扩展
                for (let j = 0; j < 16; j++) {
                    w[j] = (bytes[i + j * 4] << 24) | (bytes[i + j * 4 + 1] << 16) | (bytes[i + j * 4 + 2] << 8) | bytes[i + j * 4 + 3];
                }

                for (let j = 16; j < 64; j++) {
                    w[j] = (sigma1(w[j - 2]) + w[j - 7] + sigma0(w[j - 15]) + w[j - 16]) & 0xffffffff;
                }

                // 压缩函数
                let a = h0;
                let b = h1;
                let c = h2;
                let d = h3;
                let e = h4;
                let f = h5;
                let g = h6;
                let h = h7;

                for (let j = 0; j < 64; j++) {
                    const t1 = (h + capSigma1(e) + ch(e, f, g) + K[j] + w[j]) & 0xffffffff;
                    const t2 = (capSigma0(a) + maj(a, b, c)) & 0xffffffff;

                    h = g;
                    g = f;
                    f = e;
                    e = (d + t1) & 0xffffffff;
                    d = c;
                    c = b;
                    b = a;
                    a = (t1 + t2) & 0xffffffff;
                }

                // 更新哈希值
                h0 = (h0 + a) & 0xffffffff;
                h1 = (h1 + b) & 0xffffffff;
                h2 = (h2 + c) & 0xffffffff;
                h3 = (h3 + d) & 0xffffffff;
                h4 = (h4 + e) & 0xffffffff;
                h5 = (h5 + f) & 0xffffffff;
                h6 = (h6 + g) & 0xffffffff;
                h7 = (h7 + h) & 0xffffffff;
            }

            // 转换为十六进制字符串
            function toHex(x) {
                const hex = x.toString(16).padStart(8, '0');
                return hex;
            }

            return (toHex(h0) + toHex(h1) + toHex(h2) + toHex(h3) + toHex(h4) + toHex(h5) + toHex(h6) + toHex(h7)).toLowerCase();
        }
    </script>
    
    <!-- 测试脚本 -->
    <script>
        // 全局变量
        let currentTheme = localStorage.getItem('theme') || 'light';
        const translations = {
            'zh-CN': {
                'bit_operation_type_and': '按位与',
                'bit_operation_type_or': '按位或',
                'bit_operation_type_xor': '按位异或',
                'bit_operation_type_not': '按位非',
                'bit_operation_type_left_shift': '逻辑左移',
                'bit_operation_type_right_shift': '逻辑右移',
                'bit_operation_type_circular_left': '循环左移',
                'bit_operation_type_circular_right': '循环右移'
            },
            'en': {
                'bit_operation_type_and': 'Bitwise AND',
                'bit_operation_type_or': 'Bitwise OR',
                'bit_operation_type_xor': 'Bitwise XOR',
                'bit_operation_type_not': 'Bitwise NOT',
                'bit_operation_type_left_shift': 'Logical Left Shift',
                'bit_operation_type_right_shift': 'Logical Right Shift',
                'bit_operation_type_circular_left': 'Circular Left Shift',
                'bit_operation_type_circular_right': 'Circular Right Shift'
            }
        };
        
        // 初始化主题
        function initTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeIcon();
        }
        
        // 更新主题图标
        function updateThemeIcon() {
            const icon = document.querySelector('#theme-toggle i');
            if (currentTheme === 'dark') {
                icon.classList.remove('fa-moon-o');
                icon.classList.add('fa-sun-o');
            } else {
                icon.classList.remove('fa-sun-o');
                icon.classList.add('fa-moon-o');
            }
        }
        
        // 切换主题
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeIcon();
            
            addTestResult('主题切换', '成功', '主题已切换为 ' + currentTheme);
        }
        
        // 添加测试结果
        function addTestResult(testName, status, message) {
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            const statusClass = status === '成功' ? 'text-green-600' : 'text-red-600';
            resultDiv.className = `p-2 border-l-4 ${statusClass} bg-gray-50 dark:bg-gray-800`;
            resultDiv.innerHTML = `
                <strong>${testName}:</strong> <span class="font-bold">${status}</span>
                ${message ? `<br><small>${message}</small>` : ''}
            `;
            resultsDiv.appendChild(resultDiv);
        }
        
        // 测试SHA-256
        function testSHA256() {
            const testText = document.getElementById('sha256-test').value;
            const expectedHash = '6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b'; // SHA-256 of "1"
            
            const result = sha256(testText);
            const resultDiv = document.getElementById('sha256-test-result');
            
            resultDiv.innerHTML = `
                <p><strong>输入:</strong> "${testText}"</p>
                <p><strong>预期:</strong> ${expectedHash}</p>
                <p><strong>结果:</strong> ${result}</p>
                <p class="font-bold ${result === expectedHash ? 'text-green-600' : 'text-red-600'}">
                    ${result === expectedHash ? '✓ 测试通过' : '✗ 测试失败'}
                </p>
            `;
            
            addTestResult('SHA-256测试', result === expectedHash ? '成功' : '失败', 
                result === expectedHash ? 'SHA-256哈希值计算正确' : 'SHA-256哈希值计算错误');
        }
        
        // 测试位运算按钮翻译
        function testButtonTranslation() {
            const lang = 'en'; // 测试英文翻译
            
            document.querySelectorAll('.bit-operator-btn').forEach(btn => {
                const key = btn.dataset.translateKey;
                const operator = btn.dataset.operator;
                if (key && operator) {
                    if (operator === 'circular_left' || operator === 'circular_right') {
                        btn.innerHTML = `${translations[lang][key]}`;
                    } else {
                        btn.innerHTML = `${translations[lang][key]} (${operator})`;
                    }
                }
            });
            
            addTestResult('位运算按钮翻译', '成功', '按钮文本已更新为英文');
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化主题
            initTheme();
            
            // 绑定事件监听器
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
            document.getElementById('sha256-test-btn').addEventListener('click', testSHA256);
            document.getElementById('translate-test-btn').addEventListener('click', testButtonTranslation);
            
            // 初始测试
            testSHA256();
        });
    </script>
</body>
</html>
